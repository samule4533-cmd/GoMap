name: gomap
description: "GoMap - 장소 저장 지도 앱"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 지도
  mapbox_maps_flutter: ^2.0.0

  # 상태관리
  flutter_riverpod: ^2.5.1

  # 네트워크
  http: ^1.2.0

  # 백엔드
  supabase_flutter: ^2.5.0

  # 위치
  geolocator: ^11.0.0

  # 유틸
  intl: ^0.19.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
